# Host (Apple Silicon) build: tune for the local CPU.
# Scoped to the host target ONLY — a global `[build] rustflags = target-cpu=native`
# leaks into cross-compiles (Android / x86), telling them to use the BUILD machine's
# CPU features, which is wrong and breaks the binary. Cross targets get generic codegen
# + Spissa's runtime feature detection (is_aarch64_feature_detected! for dotprod/i8mm),
# so one Android binary runs on every ARM64 phone.
[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

# Android cross-compile uses `cargo ndk` (finds the NDK via $ANDROID_NDK_HOME), so the
# linker is NOT hardcoded here — keeps this file portable across machines.
# Build: ANDROID_NDK_HOME=<ndk> cargo ndk -t arm64-v8a -p 24 build --release -p spissa-cli --bin spissa
