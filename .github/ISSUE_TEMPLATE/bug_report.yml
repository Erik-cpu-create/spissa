name: Bug report
description: Report a defect in Spissa
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report
        security vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands. Include the model/codec if relevant.
      placeholder: |
        1. spissa pack ./model_dir --out model.spsa --codec rtc-rans-v1
        2. spissa chat model.spsa
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Spissa version / commit
      description: Output of `spissa --version` or the git commit hash.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Android / Termux
        - Other (describe below)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant terminal output. Set `RUST_LOG=debug` for more detail.
      render: shell
