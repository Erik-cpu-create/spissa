name: Feature request
description: Suggest an idea or enhancement for Spissa
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Spissa doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A new codec, CLI flag, model arch, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
  - type: checkboxes
    id: invariants
    attributes:
      label: Project invariants
      description: Spissa keeps a few hard rules (see CONTRIBUTING.md §6).
      options:
        - label: This proposal stays lossless by default (or is clearly labeled lossy)
